<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <style>
        table,tr,th,td{
            border: solid black;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <a href="./index.html">Goto Page 01</a>
    <a href="./tables-page-2.html">Goto Page 02</a>
    <h1>Tables In HTML</h1>
    <h2>Example of Table</h2>
    <table>
        <thead>
        <tr>
        <th></th>
        <th scope="col">Home starter hosting</th>
        <th scope="col">Premium business hosting</th>
        </tr>
        </thead>
        <tbody>
        <tr>
        <th scope="row">Disk space</th>
        <td>250mb</td>
        <td>1gb</td>
        </tr>
        <tr>
        <th scope="row">Bandwidth</th>
        <td>5gb per month</td>
        <td>50gb per month</td>
        </tr>
        <!-- more rows like the two above here -->
        </tbody>
        <tfoot>
        <tr>
        <td></td>
        <td colspan="2">Sign up now and save 10%!</td>
        </tr>
        </tfoot>
    </table>
        
    
</body>
</html>
