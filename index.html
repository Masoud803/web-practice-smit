<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <style>
        body{
            background-image: url(./Personal-Portfolio-Website/Images/background.jpg);
            background-repeat: no-repeat;
            background-size: cover;
        }
        div{
            color: rgb(194, 195, 196);
            margin-left: 20%;
            margin-right: 20%;
            margin-top: 12%;
            text-align: center;
        }
        ::placeholder{
            color: black;
            opacity: 1;
        }
        #usern {
            border: 2px solid rgb(0, 0, 0);
            width: 40%;
            padding: 13px;
            border-radius: 40px;
        }
        #passw {
            border: 2px solid rgb(0, 0, 0);
            width: 40%;
            padding: 13px;
            border-radius: 40px;
        }
        #btn{
            background-color: rgb(145, 145, 145);
            border: 2px solid rgb(0, 0, 0);
            font-size: x-large;
            width: 45%;
            padding: 5px;
            border-radius: 40px;
            margin-left: 20px;
        }
        #img1{   
            background-color: aliceblue;
            border: 2px solid rgb(0, 0, 0);
            border-radius: 50px;
        }
        #img2{   
            background-color: aliceblue;
            border: 2px solid rgb(0, 0, 0);
            border-radius: 50px;
        }
        a{
            color: black;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div>
        <form>
            <h1>USER LOGIN</h1>
            <img id="img1" src="./Personal-Portfolio-Website/Images/user.png" alt="user">
            <input type="text" id="usern" placeholder="Username" maxlength="15">
            <br><br>
            <img id="img2" src="./Personal-Portfolio-Website/Images/password.png" alt="password">
            <input type="password" id="passw" placeholder="Password" maxlength="10">
            <br><br>
            <p>Enter Username and Password and Press Login to Enter.</p>
            <br><br>
            <button type="submit" id="btn"><a href="./main.html">LOGIN</a></button>
        </form>
        
    </div>
</body>
</html>
